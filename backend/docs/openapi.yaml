          $ref: '#/components/responses/UnauthorizedError'
  /onboarding/complete:
    post:
      tags:
        - Onboarding
      summary: Mark onboarding complete.
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Onboarding completed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericMessageResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /me/context:
    get:
      tags:
