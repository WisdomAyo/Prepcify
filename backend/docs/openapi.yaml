            type: string
      responses:
        '200':
          description: Paginated question list.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/QuestionListResponse'
        '401':
          $ref: '#/components/responses/UnauthorizedError'
  /questions/{question}:
    get:
      tags:
