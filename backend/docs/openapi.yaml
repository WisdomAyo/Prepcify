        - bearerAuth: []
      responses:
        '200':
          description: Paginated tutor session list.
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/TutorSession'
                  meta:
                    type: object
                    properties:
