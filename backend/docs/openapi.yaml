  /onboarding/subjects:
    post:
      tags:
        - Onboarding
      summary: Choose active subjects for onboarding.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - selections
              properties:
                selections:
                  type: array
                  items:
                    type: object
                    required:
                      - exam_body_id
                      - subject_id
                    properties:
                      exam_body_id:
                        type: integer
                      subject_id:
                        type: integer
      responses:
        '200':
          description: Subject selections updated.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GenericMessageResponse'
